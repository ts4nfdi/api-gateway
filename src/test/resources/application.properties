spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Authentification
jwt.secret=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
jwt.expiration=86400000

user.admin.password=change_me
spring.codec.max-in-memory-size=10MB

oidc.client-id=${OIDC_CLIENT_ID:https://terminology.services.base4nfdi.de}
oidc.client-secret=${OIDC_CLIENT_SECRET:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
oidc.authority=${OIDC_AUTHORITY:https://infraproxy.nfdi-aai.dfn.de}
oidc.authorization-endpoint=${OIDC_AUTHORIZATION_ENDPOINT:https://infraproxy.nfdi-aai.dfn.de/idp/profile/oidc/authorize}
oidc.token-endpoint=${OIDC_TOKEN_ENDPOINT:https://infraproxy.nfdi-aai.dfn.de/idp/profile/oidc/token}
oidc.userinfo-endpoint=${OIDC_USERINFO_ENDPOINT:https://infraproxy.nfdi-aai.dfn.de/idp/profile/oidc/userinfo}
oidc.end-session-endpoint=${OIDC_END_SESSION_ENDPOINT:https://infraproxy.nfdi-aai.dfn.de/idp/profile/Logout}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER:https://infraproxy.nfdi-aai.dfn.de}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:https://infraproxy.nfdi-aai.dfn.de/idp/profile/oidc/keyset}