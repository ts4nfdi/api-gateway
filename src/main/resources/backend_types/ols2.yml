name: ols2

pagination:
  type: page
  first: 0

models:
  artefact: &artefact
    label: title|http://www.w3.org/2000/01/rdf-schema#label|label
    iri: uri|iri
    ontology: ontologyId
    synonyms: label
    descriptions: definition|description
    shortForm: ontologyId
    type: type
    sourceUrl: linkedEntities->self->source
    obsolete: isObsolete
    modified: loaded
    ontologyIri: uri|iri
    version: http://www.w3.org/2002/07/owl#versionInfo
  term: &term
    label: label
    iri: iri
    ontology: ontologyId
    synonyms: synonym|synonym->value
    descriptions: definition|description|definition->value|description->value
    shortForm: shortForm
    type: type
    sourceUrl: linkedEntities->self->source
    obsolete: isObsolete
    ontologyIri: ontologyIri
    modified: loaded
    annotations->depiction: http://xmlns.com/foaf/0.1/depiction

endpoints:
  search:
    path: /v2/entities?search=%s
    responseMapping:
      collectionFilter: ontologyId
      nestedJson: elements
      <<: *term

  resources:
    path: /v2/ontologies?size=10000
    responseMapping:
      nestedJson: elements
      page: page
      totalCount: totalElements
      <<: *artefact

  concepts:
    path: /v2/ontologies/%s/classes?page=%s&size=50
    responseMapping:
      nestedJson: elements
      totalCount: totalElements
      page: page
      <<: *term

  properties:
    path: /v2/ontologies/%s/properties?page=%s&size=50
    responseMapping:
      nestedJson: elements
      totalCount: totalElements
      page: page
      <<: *term

  concept_details:
    path: /v2/ontologies/%s/classes?iri=%s
    responseMapping:
      nestedJson: elements
      <<: *term

  property_details:
    path: /v2/ontologies/%s/properties?iri=%s
    responseMapping:
      nestedJson: elements
      <<: *term

  resource_details:
    path: /v2/ontologies/%s
    responseMapping:
      nestedJson: ""
      key: ""
      <<: *artefact

  individuals:
    path: /v2/ontologies/%s/individuals?page=%s&size=50
    responseMapping:
      nestedJson: elements
      totalCount: totalElements
      page: page
      <<: *term

  individual_details:
    path: /v2/ontologies/%s/individuals?iri=%s
    responseMapping:
      nestedJson: elements
      <<: *term

  concepts_roots:
    path: /v2/ontologies/%s/classes?hasDirectParents=false&size=1000&lang=en&includeObsoleteEntities=false
    responseMapping:
      nestedJson: elements
      <<: *term
      hasChildren: hasDirectChildren

  concepts_children:
    path: /v2/ontologies/%s/classes/%s/hierarchicalChildren?size=1000&lang=en&includeObsoleteEntities=false
    caseInsensitive: false
    responseMapping:
      nestedJson: elements
      totalCount: totalElements
      page: page
      <<: *term
      hasChildren: hasDirectChildren

  concept_tree:
    path: /v2/ontologies/%s/classes/%s/hierarchicalAncestors?page=0&size=10000&lang=en
    caseInsensitive: false
    responseMapping:
      nestedJson: elements
      totalCount: totalElements
      page: page
      <<: *term
      hasChildren: hasDirectChildren

  suggest:
    path: /select?q=%s&fieldList=iri&fieldList=label&fieldList=ontology_name&rows=%s&start=%s
    responseMapping:
      nestedJson: response
      key: docs
      iri: iri
      label: label
      ontologyIri: ontology_name
      totalCount: response->numFound
      page: page->start
