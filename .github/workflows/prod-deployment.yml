name: Deployment to production
concurrency: production
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Image SHA ID (optional), default is git sha'
        type: string
        required: false

env:
  KUBECONFIG: .kube/config
  KUBECONFIG_FILE: ${{ secrets.KUBECONFIG_PROD }}

jobs:
  deploy_main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - id: generate-image-tag
        name: Generate Image Tag
        run: |
          head_ref="${GITHUB_HEAD_REF//\//-}"
          ref_name="${head_ref:-${GITHUB_REF_NAME/main/latest}}"
          echo "imageTag=${ref_name#v}" >> $GITHUB_ENV

      - uses: actions/checkout@v2

      - name: Set up Kubernetes config
        run: |
          mkdir -p .kube
          echo "${{ env.KUBECONFIG_FILE }}" > $KUBECONFIG

      - name: Create Kubernetes secret for ONTOPORTAL_APIKEY
        run: |
          kubectl create secret generic ontoportal-secret \
            --from-literal=ONTOPORTAL_APIKEY=${{ secrets.ONTOPORTAL_APIKEY }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret for ADMIN_PASSWORD
        run: |
          kubectl create secret generic admin-password \
            --from-literal=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret for JWT_SECRET
        run: |
          kubectl create secret generic jwt-secret \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret for OIDC_CLIENT_SECRET
        run: |
          kubectl create secret generic oidc-client-secret \
            --from-literal=OIDC_CLIENT_SECRET=${{ secrets.OIDC_CLIENT_SECRET }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_CLIENT_ID
        run: |
          kubectl create configmap oidc-client-id \
            --from-literal=OIDC_CLIENT_ID=${{ env.OIDC_CLIENT_ID }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_AUTHORITY
        run: |
          kubectl create configmap oidc-authority \
            --from-literal=OIDC_AUTHORITY=${{ env.OIDC_AUTHORITY }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_ISSUER
        run: |
          kubectl create configmap oidc-issuer \
            --from-literal=OIDC_ISSUER=${{ env.OIDC_ISSUER }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_AUTHORIZATION_ENDPOINT
        run: |
          kubectl create configmap oidc-authorization-endpoint \
            --from-literal=OIDC_AUTHORIZATION_ENDPOINT=${{ env.OIDC_AUTHORIZATION_ENDPOINT }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_TOKEN_ENDPOINT
        run: |
          kubectl create configmap oidc-token-endpoint \
            --from-literal=OIDC_TOKEN_ENDPOINT=${{ env.OIDC_TOKEN_ENDPOINT }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_USERINFO_ENDPOINT
        run: |
          kubectl create configmap oidc-userinfo-endpoint \
            --from-literal=OIDC_USERINFO_ENDPOINT=${{ env.OIDC_USERINFO_ENDPOINT }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_END_SESSION_ENDPOINT
        run: |
          kubectl create configmap oidc-end-session-endpoint \
            --from-literal=OIDC_END_SESSION_ENDPOINT=${{ env.OIDC_END_SESSION_ENDPOINT }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes configmap for OIDC_JWK_SET_URI
        run: |
          kubectl create configmap oidc-jwk-set-uri \
            --from-literal=OIDC_JWK_SET_URI=${{ env.OIDC_JWK_SET_URI }} \
            --namespace='ts4nfdi' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        uses: stefanprodan/kube-tools@v1
        with:
          helmv3: 3.12.0
          command: |
            kubectl get nodes
            helmv3 repo add api-gateway-deployment https://ts4nfdi.github.io/api-gateway-deployment/
            helmv3 repo update
            helmv3 upgrade ts4nfdi-api-gateway \
              --install \
              --namespace='ts4nfdi' \
              --set-json='ingress.dns="terminology.services.base4nfdi.de"'  \
              --set-json='ingress.redirectDns="ts.services.base4nfdi.de"'  \
              --set-json='images.backend="ghcr.io/${{ github.repository }}:${{ inputs.image_sha || github.sha }}"'  \
              --set-json='postgres.logical_backup="true"'  \
              --set-json='postgres.number_instances_postgres="2"'  \
              --set-json='postgres.volume_size="10Gi"'  \
              --set-json='number_instances_backend="2"'  \
              --set-json='ingress.enableSSL="true"'  \
              --set-json='ingress.certIssuer="letsencrypt-prod"'  \
              api-gateway-deployment/api-gateway
